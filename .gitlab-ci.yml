image: curlimages/curl:latest

stages:
  - upload
  - deploy

register package:
  image: dwdraju/alpine-curl-jq
  services: [ ]
  stage: upload
  only:
    - tags
  before_script:
    - VERSION=$([[ -z "$CI_COMMIT_TAG" ]] && echo "$CI_COMMIT_REF_NAME" || echo "$CI_COMMIT_TAG")
    - PACKAGE_NAME=$(cat extension-config.json | jq -r '.id' | sed -e 's/\//-/g' | sed 's/@//g')
    - TAR_FILE=${PACKAGE_NAME}.${VERSION}.tar.gz
    - URL=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${VERSION}/$TAR_FILE
  script:
    - tar -zcvf ${TAR_FILE} ./*
    - >
      response=$(curl -s -w "\n%{http_code}" --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file ${TAR_FILE} ${URL})
    - code=$(echo "$response" | tail -n 1)
    - body=$(echo "$response" | head -n 1)
    # Output state information
    - if [ $code -eq 201 ]; then
      echo "Package created - Code $code - $body";
      else
      echo "Could not create package - Code $code - $body";
      exit 1;
      fi
  artifacts:
    name: ${TAR_FILE}
    expire_in: never
    paths:
      - ${TAR_FILE}

publish to shopgate:
  image: node:14.15.4-slim
  services: [ ]
  stage: deploy
  only:
    - tags
  variables:
    GIT_STRATEGY: none
  needs:
    - register package
  before_script:
    - ARTIFACT=$(find . -type f -name "*.tar.gz" -print -quit)
  script:
    - npm install -g @shopgate/platform-sdk
    - sgconnect login --username ${SG_USER} --password ${SG_PASS}
    - sgconnect init
    - mkdir -p extensions/temp
    - tar -xvf ${ARTIFACT} -C extensions/temp
#    - curl -sS https://webinstall.dev/jq | bash
#    - PACKAGE_NAME=$(cat extensions/temp/extension-config.json | jq -r '.id')
    - sgconnect extension upload temp --force
